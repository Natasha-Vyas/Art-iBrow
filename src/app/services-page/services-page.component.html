<main class="services-page">
    <section class="hero-section">
        <div class="hero-copy">
            <p class="eyebrow">ART iBrow</p>
            <h1>All Services & Prices</h1>
            <p class="intro">
                View every service and price in one place. This page is separate from the Pricing page and is not linked in the main navigation.
            </p>
            <div class="hero-actions">
                <a class="book-link" [href]="social?.hrefPhone">Call to Book</a>
                <span *ngIf="contact">{{ contact }}</span>
            </div>
        </div>
    </section>

    <section class="services-layout">
        <section class="category-nav" *ngIf="categories.length">
            <a *ngFor="let category of categories" href="" (click)="$event.preventDefault(); scrollToCategory(category)">
                {{ category.categoryName }}
            </a>
        </section>

        <section class="menu-sections" #menuSections>
            <article class="menu-card" *ngFor="let category of categories" [id]="getCategoryAnchor(category)">
                <div class="section-heading">
                    <h2>{{ category.categoryName }}</h2>
                </div>

                <div class="service-list">
                    <div class="service-row" *ngFor="let item of category.items">
                        <div class="service-copy" [routerLink]="hasDedicatedServicePage(item) ? item.link : null"
                            [class.no-link]="!hasDedicatedServicePage(item)">
                            <h3>{{ item.itemName }}</h3>
                        </div>
                        <div class="service-meta">
                            <span class="price">{{ item.itemPrice }}</span>
                        </div>
                    </div>
                </div>
            </article>
        </section>
    </section>
</main>
